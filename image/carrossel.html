<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apresentação do Sistema</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

/* estrutura principal */
.container{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:20px;
  width:95vw;
}

/* imagem central */
.principal{
  width:90%;
  max-width:1000px;
}

.principal img{
  width:100%;
  max-height:85vh;
  object-fit:contain;

  border-radius:12px;
  background: rgba(0,0,0,0.4);
  padding:12px;

  box-shadow:0 25px 50px rgba(0,0,0,0.5);
}

/* miniaturas */
.thumb{
  width:120px;
  opacity:0.6;
  cursor:pointer;
  transition:0.2s;
}

.thumb:hover{
  opacity:1;
  transform:scale(1.05);
}

.thumb img{
  width:100%;
  border-radius:10px;
}

/* botões */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
}

.nav button, .voltar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;

  background:white;
  color:black;
  cursor:pointer;

  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* voltar */
.voltar{
  position:fixed;
  top:20px;
  left:20px;
}

/* contador */
#contador{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);

  font-size:14px;
  opacity:0.85;

  background: rgba(0,0,0,0.3);
  padding:6px 12px;
  border-radius:10px;

  backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<button class="voltar" onclick="voltar()">←</button>

<div class="container">

  <!-- esquerda -->
  <div class="thumb" onclick="anterior()">
    <img id="imgAnterior">
  </div>

  <!-- centro -->
  <div class="principal">
    <img id="imgAtual">
  </div>

  <!-- direita -->
  <div class="thumb" onclick="proximo()">
    <img id="imgProxima">
  </div>

</div>

<div id="contador"></div>

<div class="nav">
  <button onclick="anterior()">◀</button>
  <button onclick="proximo()">▶</button>
</div>

<script>

const imagens = [
  "Slide10.PNG",
  "Slide11.PNG",
  "Slide12.PNG",
  "Slide13.PNG",
  "Slide14.PNG",
  "Slide15.PNG",
  "Slide16.PNG",
  "Slide17.png",
  "Slide18.png"
];

let i = 0;

function atualizar(){

  const anterior = (i - 1 + imagens.length) % imagens.length;
  const proxima = (i + 1) % imagens.length;

  document.getElementById("imgAtual").src = imagens[i];
  document.getElementById("imgAnterior").src = imagens[anterior];
  document.getElementById("imgProxima").src = imagens[proxima];

  document.getElementById("contador").innerText =
    (i+1) + " / " + imagens.length;
}

function proximo(){
  i = (i + 1) % imagens.length;
  atualizar();
}

function anterior(){
  i = (i - 1 + imagens.length) % imagens.length;
  atualizar();
}

function voltar(){
  const params = new URLSearchParams(window.location.search);
  const slide = params.get("slide") || 0;

  window.location.href = "../painel.html?slide=" + slide;
}

atualizar();

</script>

</body>
</html>
