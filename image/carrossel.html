<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apresentação do Sistema</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

/* container */
.viewer{
  width:70%;
  max-width:800px;
}

.viewer img{
  width:100%;
  max-height:90vh;

  object-fit:contain;

  border-radius:2px;
  background: rgba(0,0,0,0.4);
  padding:12px;

  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.img-anim{
  opacity:0;
  transform: scale(0.98);
  transition: all 0.3s ease;
}

.img-anim.show{
  opacity:1;
  transform: scale(1);
}
/* navegação */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
}

/* botões */
.nav button, .voltar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;

  background:white;
  color:black;
  cursor:pointer;

  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* voltar */
.voltar{
  position:fixed;
  top:20px;
  left:20px;
}

#contador{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);

  font-size:14px;
  opacity:0.8;

  background: rgba(0,0,0,0.3);
  padding:6px 12px;
  border-radius:10px;

  backdrop-filter: blur(6px);
}
.carrossel{
  position:relative;
  width:80vw;
  height:70vh;
  display:flex;
  justify-content:center;
  align-items:center;
  perspective:1000px;
}

/* cada imagem */
.item{
  position:absolute;
  width:60%;
  max-width:700px;

  transition: all 0.5s ease;

  border-radius:12px;
  background: rgba(0,0,0,0.4);
  padding:10px;

  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}

/* centro */
.ativo{
  transform: translateX(0) scale(1);
  opacity:1;
  z-index:3;
}

/* direita */
.dir{
  transform: translateX(60%) scale(0.8) rotateY(-30deg);
  opacity:0.6;
  z-index:2;
}

/* esquerda */
.esq{
  transform: translateX(-60%) scale(0.8) rotateY(30deg);
  opacity:0.6;
  z-index:2;
}

/* fundo (quase invisível) */
.fundo{
  transform: translateX(0) scale(0.6);
  opacity:0.2;
  z-index:1;
}
</style>
</head>

<body>

<button class="voltar" onclick="voltar()">←</button>

<div class="carrossel" id="carrossel"></div>
  
  <img id="img" class="img-anim" src="">
</div>
  
<div id="contador"></div>

<div class="nav">
  <button onclick="anterior()">◀</button>
  <button onclick="proximo()">▶</button>
</div>

<script>
const imagens = [
  "Slide10.PNG",
  "Slide11.PNG",
  "Slide12.PNG",
  "Slide13.PNG",
  "Slide14.PNG",
  "Slide15.PNG",
  "Slide16.PNG",
  "Slide17.png",
  "Slide18.png"
];

let i = 0;

const carrossel = document.getElementById("carrossel");

// cria elementos
imagens.forEach(src => {
  const img = document.createElement("img");
  img.src = src;
  img.className = "item";
  carrossel.appendChild(img);
});

function atualizar(){

  const itens = document.querySelectorAll(".item");

  itens.forEach((el, index) => {
    el.className = "item";

    if(index === i){
      el.classList.add("ativo");
    }
    else if(index === (i + 1) % imagens.length){
      el.classList.add("dir");
    }
    else if(index === (i - 1 + imagens.length) % imagens.length){
      el.classList.add("esq");
    }
    else{
      el.classList.add("fundo");
    }
  });

  document.getElementById("contador").innerText =
    (i+1) + " / " + imagens.length;
}

function proximo(){
  i = (i + 1) % imagens.length;
  atualizar();
}

function anterior(){
  i = (i - 1 + imagens.length) % imagens.length;
  atualizar();
}

function voltar(){
  const params = new URLSearchParams(window.location.search);
  const slide = params.get("slide") || 0;

  window.location.href = "../painel.html?slide=" + slide;
}

atualizar();
</script>

</body>
</html>
