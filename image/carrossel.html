<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apresentação do Sistema</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

/* container */
.viewer{
  width:70%;
  max-width:800px;
}

.viewer img{
  width:100%;
  max-height:90vh;

  object-fit:contain;

  border-radius:2px;
  background: rgba(0,0,0,0.4);
  padding:12px;

  box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}
.img-anim{
  opacity:0;
  transform: scale(0.98);
  transition: all 0.3s ease;
}

.img-anim.show{
  opacity:1;
  transform: scale(1);
}
/* navegação */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
}

/* botões */
.nav button, .voltar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;

  background:white;
  color:black;
  cursor:pointer;

  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* voltar */
.voltar{
  position:fixed;
  top:20px;
  left:20px;
}

#contador{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);

  font-size:14px;
  opacity:0.8;

  background: rgba(0,0,0,0.3);
  padding:6px 12px;
  border-radius:10px;

  backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<button class="voltar" onclick="voltar()">←</button>

<div class="viewer">
  
  <img id="img" class="img-anim" src="">
</div>
  
<div id="contador"></div>

<div class="nav">
  <button onclick="anterior()">◀</button>
  <button onclick="proximo()">▶</button>
</div>

<script>

const imagens = [
  "Slide10.PNG",
  "Slide11.PNG",
  "Slide12.PNG",
  "Slide13.PNG",
  "Slide14.PNG",
  "Slide15.PNG",
  "Slide16.PNG",
  "Slide17.png",
  "Slide18.png"
];

let i = 0;

function render(){
  const img = document.getElementById("img");

  img.classList.remove("show");

  setTimeout(() => {
    img.src = imagens[i];
    document.getElementById("contador").innerText =
      (i+1) + " / " + imagens.length;

    img.classList.add("show");
  }, 150);
}

function proximo(){
  i = (i + 1) % imagens.length;
  render();
}

function anterior(){
  i = (i - 1 + imagens.length) % imagens.length;
  render();
}

function voltar(){
  const params = new URLSearchParams(window.location.search);
  const slide = params.get("slide") || 0;

  window.location.href = "../painel.html?slide=" + slide;
}

render();

</script>

</body>
</html>
