<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apresentação do Sistema</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  height:100vh;
  font-family:Arial;
  display:flex;
  justify-content:center;
  align-items:center;

  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

/* área do carrossel */
.frame{
  position:relative;
  width:80vw;
  max-width:900px;
  height:75vh;
  overflow:hidden;
}

/* imagens */
.slide{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:contain;

  border-radius:12px;
  background: rgba(0,0,0,0.4);
  padding:12px;

  box-shadow:0 20px 40px rgba(0,0,0,0.4);

  transition: all 0.4s ease;
}

/* posições */
.center{
  left:0;
  opacity:1;
  z-index:2;
}

.right{
  left:100%;
  opacity:0;
}

.left{
  left:-100%;
  opacity:0;
}

/* botões */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
}

.nav button, .voltar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;

  background:white;
  color:black;
  cursor:pointer;

  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* voltar */
.voltar{
  position:fixed;
  top:20px;
  left:20px;
}

/* contador */
#contador{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);

  font-size:14px;
  opacity:0.85;

  background: rgba(0,0,0,0.3);
  padding:6px 12px;
  border-radius:10px;

  backdrop-filter: blur(6px);
}
</style>
</head>

<body>

<button class="voltar" onclick="voltar()">←</button>

<div class="frame">
  <img id="imgAtual" class="slide center">
  <img id="imgNova" class="slide right">
</div>

<div id="contador"></div>

<div class="nav">
  <button onclick="anterior()">◀</button>
  <button onclick="proximo()">▶</button>
</div>

<script>

const imagens = [
  "Slide10.PNG",
  "Slide11.PNG",
  "Slide12.PNG",
  "Slide13.PNG",
  "Slide14.PNG",
  "Slide15.PNG",
  "Slide16.PNG",
  "Slide17.png",
  "Slide18.png"
];

let i = 0;

const atual = document.getElementById("imgAtual");
const nova = document.getElementById("imgNova");

function atualizarContador(){
  document.getElementById("contador").innerText =
    (i+1) + " / " + imagens.length;
}

function iniciar(){
  atual.src = imagens[i];
  atualizarContador();
}

function proximo(){
  trocar(1);
}

function anterior(){
  trocar(-1);
}

function trocar(dir){

  i = (i + dir + imagens.length) % imagens.length;

  nova.src = imagens[i];

  // define direção
  if(dir === 1){
    nova.className = "slide right";
  }else{
    nova.className = "slide left";
  }

  setTimeout(() => {

    // entra
    nova.classList.remove("right", "left");
    nova.classList.add("center");

    // sai
    atual.classList.remove("center");
    atual.classList.add(dir === 1 ? "left" : "right");

  }, 10);

  // troca referências
  setTimeout(() => {
    atual.src = imagens[i];
    atual.className = "slide center";
    nova.className = "slide right";
  }, 400);

  atualizarContador();
}

function voltar(){
  const params = new URLSearchParams(window.location.search);
  const slide = params.get("slide") || 0;

  window.location.href = "../painel.html?slide=" + slide;
}

iniciar();

</script>

</body>
</html>
