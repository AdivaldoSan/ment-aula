<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Apresentação do Sistema</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;

  background: linear-gradient(135deg, #1e3c72, #2a5298);
  color:white;
}

/* estrutura principal */
.container{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:300px;
  width:95vw;
}

/* imagem central */
.principal{
  width:95vw;          /* 🔥 ocupa quase toda tela */
  max-width:none;      /* 🔥 remove limite */
}

.principal img{
  width:100%;
  height:90vh;         /* 🔥 controla tamanho real */
  object-fit:contain;

  border-radius:12px;

  background: transparent;
  padding:0;
  box-shadow:none;

  transform:none;      /* 🔥 remove escala fake */
}

/* miniaturas */
.thumb{
  width:120px;
  opacity:0.5;
  cursor:pointer;
  transition:0.2s;
}

.thumb:hover{
  opacity:1;
  transform:scale(1.05);
}

.thumb img{
  width:100%;
  border-radius:10px;
}

/* botões */
.nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:15px;
}

.nav button, .voltar{
  width:50px;
  height:50px;
  border-radius:50%;
  border:none;
  font-size:20px;

  background:white;
  color:black;
  cursor:pointer;

  box-shadow:0 0 10px rgba(0,0,0,0.3);
}

/* voltar */
.voltar{
  position:fixed;
  top:20px;
  left:20px;
}

/* contador */
#contador{
  position:fixed;
  bottom:90px;
  left:50%;
  transform:translateX(-50%);

  font-size:14px;
  opacity:0.85;

  background: rgba(0,0,0,0.3);
  padding:6px 12px;
  border-radius:10px;

  backdrop-filter: blur(6px);
}
.slide-anim{
  transition: all 0.35s ease;
  opacity:0;
  transform: translateX(40px);
}

.slide-anim.show{
  opacity:1;
  transform: translateX(0);
}

.slide-left{
  transform: translateX(-40px);
}
#topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:50px;

  display:flex;
  align-items:center;
  justify-content:center;

  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);

  font-weight:bold;
  z-index:1000;
}
#app{
  height:calc(100vh - 50px);
  margin-top:50px;

  display:flex;
  justify-content:center;
  align-items:center;
}
</style>
</head>

<body>
<div id="topbar">
  Princípios e Finalidades da Educação Nacional
</div>

<div id="app">
<button class="voltar" onclick="voltar()">←</button>
<div class="container">

  <!-- esquerda -->
  <div class="thumb" onclick="anterior()">
    <img id="imgAnterior">
  </div>

  <!-- centro -->
  <div class="principal">
    <img id="imgAtual" class="slide-anim">
  </div>

  <!-- direita -->
  <div class="thumb" onclick="proximo()">
    <img id="imgProxima">
  </div>

</div>
</div>
  
<div id="contador"></div>

<div class="nav">
  <button onclick="anterior()">◀</button>
  <button onclick="proximo()">▶</button>
</div>

<script>

const imagens = [
  "Slide10.PNG",
  "Slide11.PNG",
  "Slide12.PNG",
  "Slide13.PNG",
  "Slide14.PNG",
  "Slide15.PNG",
  "Slide16.PNG",
  "Slide17.png",
  "Slide18.png"
];

let i = 0;

function atualizar(direcao = "dir"){

  const img = document.getElementById("imgAtual");

  img.classList.remove("show");

  // direção da animação
  if(direcao === "esq"){
    img.classList.add("slide-left");
  }else{
    img.classList.remove("slide-left");
  }

  setTimeout(() => {

    const anterior = (i - 1 + imagens.length) % imagens.length;
    const proxima = (i + 1) % imagens.length;

    document.getElementById("imgAtual").src = imagens[i];
    document.getElementById("imgAnterior").src = imagens[anterior];
    document.getElementById("imgProxima").src = imagens[proxima];

    document.getElementById("contador").innerText =
      (i+1) + " / " + imagens.length;

    img.classList.add("show");

  }, 120);
}

function proximo(){
  i = (i + 1) % imagens.length;
  atualizar("dir");
}

function anterior(){
  i = (i - 1 + imagens.length) % imagens.length;
  atualizar("esq");
}

function voltar(){
  const params = new URLSearchParams(window.location.search);
  const slide = params.get("slide") || 0;

  window.location.href = "../painel.html?slide=" + slide;
}

atualizar();

</script>

</body>
</html>
