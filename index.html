<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Interativo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:white;
  display:flex;
  height:100vh;
}

/* LADO ESQUERDO */
#left{
  width:30%;
  background:#1e1e1e;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;
}

#left img{
  width:160px;
}

#left p{
  margin-top:10px;
  text-align:center;
}

/* LADO DIREITO */
#right{
  width:70%;
  display:flex;
  flex-direction:column;
  padding:10px;
}

.box{
  flex:1;
  border:1px solid #333;
  margin:8px;
  border-radius:10px;
  padding:10px;
  overflow:auto;
}

h3{
  margin-top:0;
}

/* NUVEM */
.word{
  display:inline-block;
  margin:5px;
  transition:0.3s;
}

/* BARRAS */
.bar{
  background:#444;
  margin:5px 0;
  border-radius:6px;
  overflow:hidden;
}

.bar-inner{
  background:#00c853;
  padding:5px;
  text-align:left;
}
</style>
</head>

<body>

<!-- ESQUERDA -->
<div id="left">
  <h2>Participe</h2>

  <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://adivaldosan.github.io/ment-aula/responder.html">

  <p>Escaneie o QR Code</p>
  <p><b>ou acesse:</b><br>adivaldosan.github.io/ment-aula/responder.html</p>
</div>

<!-- DIREITA -->
<div id="right">

  <div class="box">
    <h3>P1 - Objetivo da educação</h3>
    <div id="p1"></div>
  </div>

  <div class="box">
    <h3>P2 - Qualidade</h3>
    <div id="p2"></div>
  </div>

  <div class="box">
    <h3>P3 - Como saber se funciona</h3>
    <div id="p3"></div>
  </div>

</div>

<script>

// =================== ARMAZENAMENTO ===================
let palavras1 = {};
let palavras3 = {};
let respostas2 = {
  "Sim":0,
  "Parcialmente":0,
  "Não":0
};

// =================== NORMALIZAR ===================
function normalizar(txt){
  return txt
    .toLowerCase()
    .trim()
    .split(" ")[0]; // pega só 1 palavra
}

// =================== NUVEM ===================
function renderNuvem(container, dados){
  container.innerHTML = "";

  for(let palavra in dados){
    const span = document.createElement("span");
    span.className = "word";

    const tamanho = 12 + dados[palavra]*5;

    span.style.fontSize = tamanho + "px";
    span.innerText = palavra;

    container.appendChild(span);
  }
}

// =================== BARRAS ===================
function renderBarras(){
  const total = respostas2["Sim"] + respostas2["Parcialmente"] + respostas2["Não"];

  p2.innerHTML = "";

  for(let key in respostas2){

    const valor = respostas2[key];
    const porcento = total ? (valor/total)*100 : 0;

    const bar = document.createElement("div");
    bar.className = "bar";

    bar.innerHTML = `
      <div class="bar-inner" style="width:${porcento}%">
        ${key} (${valor})
      </div>
    `;

    p2.appendChild(bar);
  }
}

// =================== FIREBASE ===================
db.ref("respostas").on("child_added", snap => {

  const d = snap.val();

  // P1
  let w1 = normalizar(d.p1);
  if(w1){
    palavras1[w1] = (palavras1[w1] || 0) + 1;
    renderNuvem(p1, palavras1);
  }

  // P2
  if(respostas2[d.p2] !== undefined){
    respostas2[d.p2]++;
    renderBarras();
  }

  // P3
  let w3 = normalizar(d.p3);
  if(w3){
    palavras3[w3] = (palavras3[w3] || 0) + 1;
    renderNuvem(p3, palavras3);
  }

});

</script>

</body>
</html>
