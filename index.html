<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel ao vivo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase.js"></script>

<style>
body{
  font-family:Arial;
  background:#111;
  color:white;
  text-align:center;
  margin:0;
}

#conteudo{
  margin-top:30px;
}

.card{
  border:1px solid #444;
  margin:10px;
  padding:10px;
  border-radius:8px;
}

button{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:20px;
  font-size:20px;
  background:#00c853;
  border:none;
  border-radius:10px;
  color:white;
}

img{
  margin:20px auto;
  display:block;
}

.link{
  margin-top:10px;
  font-size:18px;
}
</style>
</head>

<body>

<h1 id="titulo">Bem-vindo</h1>

<div id="conteudo"></div>

<button onclick="proximo()">AVANÇAR</button>

<script>

// ===================== TEMPO REAL =====================
function iniciarRealtime(){

  conteudo.innerHTML = "";

  db.ref("respostas").on("child_added", snap => {

    const d = snap.val();

    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <b>${d.p1}</b><br>
      ${d.p2}<br>
      ${d.p3}
    `;

    conteudo.prepend(card);
  });
}

// ===================== SLIDES =====================
let slide = 0;

const slides = [

  // SLIDE 0 → QR CODE
  () => {
    titulo.innerText = "Participe";

    conteudo.innerHTML = `
      <h2>Escaneie o QR Code</h2>

      <img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=https://adivaldosan.github.io/ment-aula/responder.html">

      <p class="link">Ou acesse:</p>
      <p class="link"><b>adivaldosan.github.io/ment-aula/responder.html</b></p>
    `;
  },

  // SLIDE 1 → RESPOSTAS AO VIVO
  () => {
    titulo.innerText = "Respostas em tempo real";
    iniciarRealtime();
  },

  // SLIDE 2 → MAPA GERAL
  () => {
    titulo.innerText = "Mapa Conceitual";
    conteudo.innerHTML = `
      <h2>PRINCÍPIOS → FINALIDADES → AVALIAÇÃO</h2>
    `;
  },

  // SLIDE 3 → PRINCÍPIOS
  () => {
    titulo.innerText = "Princípios";
    conteudo.innerHTML = `
      CF art. 206 + LDB art. 3º<br><br>
      ✔ Igualdade de acesso<br>
      ✔ Qualidade<br>
      ✔ Gestão democrática
    `;
  },

  // SLIDE 4 → FINALIDADES
  () => {
    titulo.innerText = "Finalidades";
    conteudo.innerHTML = `
      LDB art. 2º<br><br>
      ✔ Formação integral<br>
      ✔ Cidadania<br>
      ✔ Trabalho
    `;
  },

  // SLIDE 5 → PROBLEMA
  () => {
    titulo.innerText = "Problema";
    conteudo.innerHTML = `
      Distância entre teoria e prática<br><br>
      Baixo desempenho<br>
      Desigualdade<br>
      Ensino focado em nota
    `;
  },

  // SLIDE 6 → AVALIAÇÃO
  () => {
    titulo.innerText = "Avaliação";
    conteudo.innerHTML = `
      Diagnosticar → acompanhar → intervir<br><br>
      Base para decisões pedagógicas
    `;
  },

  // SLIDE 7 → CONCLUSÃO
  () => {
    titulo.innerText = "Conclusão";
    conteudo.innerHTML = `
      Sem avaliação,<br>
      os princípios ficam apenas no papel.
    `;
  }

];

// ===================== CONTROLE =====================
function proximo(){
  if(slide < slides.length){
    slides[slide++]();
  }
}

// iniciar no slide 0 automaticamente
slides[0]();

</script>

</body>
</html>
