<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Interativo</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="firebase.js"></script>

<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial;
  color:white;
  height:100vh;
  overflow:hidden;
  display:flex;

  /* NOVO FUNDO */
  background: linear-gradient(135deg, #1e3c72, #2a5298);
}

/* LAYOUT PRINCIPAL */
#app{
  display:grid;
  grid-template-columns: 50% 50%; /* <<< AQUI FOI AJUSTADO */
  width:100%;
  height:100%;
}

/* ESQUERDA */
#left{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:20px;

  /* efeito vidro leve */
  background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
}

#left img{
  width:160px;

  /* destaque no QR */
  background:white;
  padding:10px;
  border-radius:12px;
}

#left p{
  text-align:center;
  font-size:14px;
}

/* DIREITA */
#right{
  display:grid;
  grid-template-rows: 1fr 1fr 1fr;
  padding:12px;
  gap:12px;
  height:100%;
}

/* CAIXAS */
.box{
  border-radius:12px;
  padding:12px;
  overflow:auto;

  /* efeito glass */
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);

  border:1px solid rgba(255,255,255,0.1);
}

/* TITULO */
h3{
  margin:0 0 6px 0;
  font-size:16px;
}

/* NUVEM */
.word{
  display:inline-block;
  margin:4px;
  transition:0.2s;

  /* cor mais viva */
  color:#ffffff;
}

/* BARRAS */
.bar{
  background: rgba(255,255,255,0.15);
  margin:6px 0;
  border-radius:6px;
  overflow:hidden;
}

.bar-inner{
  background: linear-gradient(90deg, #00c853, #69f0ae);
  padding:5px;
  font-size:14px;
  color:#000;
  font-weight:bold;
}

/* BOTÃO */
#btn{
  position:fixed;
  bottom:15px;
  left:50%;
  transform:translateX(-50%);
  padding:14px 28px;
  font-size:18px;

  background: linear-gradient(45deg, #00c853, #69f0ae);
  border:none;
  border-radius:25px;
  color:#000;
  font-weight:bold;

  z-index:999;
  box-shadow:0 0 15px rgba(0,200,83,0.5);
  cursor:pointer;
}

/* SLIDES */
#slideBox{
  position:absolute;
  inset:0;

  /* manter padrão mas mais suave */
  background: linear-gradient(135deg, #1e3c72, #2a5298);

  display:none;
  justify-content:center;
  align-items:center;
  text-align:center;
  font-size:32px;
  padding:40px;
}

#topbar{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:50px;

  display:flex;
  align-items:center;
  justify-content:center;

  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);

  font-weight:bold;
  z-index:1000;
}

/* empurra layout */
#app{
  display:grid;
  grid-template-columns: 50% 50%;
  width:100%;
  height:calc(100vh - 50px); /* ESSA É A CHAVE */
  margin-top:50px;
}

#nav{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:999;
}

#nav button{
  width:45px;
  height:45px;
  border-radius:50%;
  border:none;
  font-size:20px;

  background:white;
  color:black;
  cursor:pointer;

  box-shadow:0 0 10px rgba(0,0,0,0.3);
}  

#reset{
  position:fixed;
  bottom:20px;
  right:20px;

  width:45px;
  height:45px;
  border-radius:50%;

  border:none;
  font-size:18px;

  background: rgba(255,255,255,0.2);
  color:white;

  backdrop-filter: blur(6px);
  cursor:pointer;
}
.slide{
  width:90%;
  max-width:1000px;
}

/* duas colunas */
.grid2{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:30px;
}

/* cards */
.card{
  background: rgba(0,0,0,0.35);
  padding:20px;
  border-radius:12px;
  backdrop-filter: blur(10px);
}

/* título grande */
.titulo-slide{
  font-size:32px;
  margin-bottom:20px;
}

/* destaque */
.highlight{
  font-size:26px;
  font-weight:bold;
  text-align:center;
}

/* seta fluxo */
.fluxo{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  font-size:20px;
}
  
</style>
</head>

<body>
  
<div id="topbar">
 Princípios e Finalidades da educação nacional.
</div>

<div id="app">

  <!-- ESQUERDA -->
  <div id="left">
    <h2>Participe</h2>

    <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://adivaldosan.github.io/ment-aula/responder.html">

    <p>Escaneie o QR Code</p>
    <p><b>ou acesse:</b><br>adivaldosan.github.io/ment-aula/responder.html</p>
  </div>

  <!-- DIREITA -->
  <div id="right">

    <div class="box">
      <h3>P1 - Qual o principal objetivo da educação?</h3>
      <div id="p1"></div>
    </div>

    <div class="box">
      <h3>P2 - A escola garante qualidade?</h3>
      <div id="p2"></div>
    </div>

    <div class="box">
      <h3>P3 - Como saber se a educação funciona?</h3>
      <div id="p3"></div>
    </div>

  </div>

</div>

<!-- SLIDES -->
<div id="slideBox"></div>

<div id="nav">
  <button onclick="voltar()">◀</button>
  <button onclick="proximo()">▶</button>
</div>
<button id="reset" onclick="limpar()">⟲</button>

<script>
const SENHA_RESET = "1234"; // ← escolha sua senha

// =================== ESTADO ===================
let slide = 0;

// =================== DADOS ===================
let palavras1 = {};
let palavras3 = {};
let respostas2 = {
  "Sim":0,
  "Parcialmente":0,
  "Não":0
};

// =================== NORMALIZAR ===================
function normalizar(txt){
  return txt.toLowerCase().trim().split(" ")[0];
}

// =================== NUVEM ===================
function renderNuvem(container, dados){
  container.innerHTML = "";

  for(let palavra in dados){
    const span = document.createElement("span");

    const tamanho = 14 + dados[palavra]*4;
    span.style.color = `hsl(${Math.random()*360},70%,65%)`;

    span.className = "word";
    span.style.fontSize = tamanho + "px";
    span.innerText = palavra;

    container.appendChild(span);
  }
}

// =================== BARRAS ===================
function renderBarras(){
  const total = respostas2["Sim"] + respostas2["Parcialmente"] + respostas2["Não"];
  p2.innerHTML = "";

  for(let key in respostas2){

    const val = respostas2[key];
    const perc = total ? (val/total)*100 : 0;

    const bar = document.createElement("div");
    bar.className = "bar";

    bar.innerHTML = `
      <div class="bar-inner" style="width:${perc}%">
        ${key} (${val})
      </div>
    `;

    p2.appendChild(bar);
  }
}

// =================== FIREBASE ===================
db.ref("respostas").on("child_added", snap => {

  const d = snap.val();

  let w1 = normalizar(d.p1);
  if(w1){
    palavras1[w1] = (palavras1[w1]||0)+1;
    renderNuvem(p1, palavras1);
  }

  if(respostas2[d.p2] !== undefined){
    respostas2[d.p2]++;
    renderBarras();
  }

  let w3 = normalizar(d.p3);
  if(w3){
    palavras3[w3] = (palavras3[w3]||0)+1;
    renderNuvem(p3, palavras3);
  }

});

// =================== SLIDES ===================
const slides = [

  // 🔴 VISÃO GERAL
  () => `
    <div class="slide">
      <div class="titulo-slide">Estrutura da Educação</div>

      <div class="grid2">
        <div class="card">PRINCÍPIOS<br><small>como deve acontecer</small></div>
        <div class="card">FINALIDADES<br><small>para que educar</small></div>
        <div class="card">PROBLEMA<br><small>o que falha</small></div>
        <div class="card">AVALIAÇÃO<br><small>como corrigir</small></div>
      </div>
    </div>
  `,

  // 🔵 PRINCÍPIOS (DUAS COLUNAS)
  () => `
    <div class="slide grid2">
      <div class="card">
        <h2>Princípios</h2>
        CF art.206<br>
        LDB art.3º
      </div>

      <div class="card">
        igualdade de acesso<br>
        liberdade de aprender<br>
        pluralismo de ideias<br>
        gestão democrática<br>
        padrão de qualidade
      </div>
    </div>
  `,

  // 🔵 FINALIDADES (CARD CENTRAL)
  () => `
    <div class="slide">
      <div class="card highlight">
        Desenvolvimento pleno<br>
        Cidadania<br>
        Trabalho
      </div>
    </div>
  `,

  // 🔵 PROBLEMA (LISTA + DESTAQUE)
  () => `
    <div class="slide grid2">
      <div class="card">
        <h2>Problema</h2>
        distância teoria × prática
      </div>

      <div class="card">
        desigualdade<br>
        baixo desempenho<br>
        ensino descontextualizado
      </div>
    </div>
  `,

  // 🔵 AVALIAÇÃO (FLUXO)
  () => `
    <div class="slide">
      <div class="titulo-slide">Avaliação</div>

      <div class="fluxo">
        Diagnosticar → Acompanhar → Intervir
      </div>
    </div>
  `,

  // 🔵 CONCLUSÃO
  () => `
    <div class="slide">
      <div class="card highlight">
        Sem avaliação,<br>
        os princípios não se concretizam
      </div>
    </div>
  `
];
//===========================================
function proximo(){

  // primeira vez → abre modo slide
   if(slide === 0){
    slideBox.style.display = "flex";
    app.style.display = "none";
    topbar.style.display = "none"; //  adiciona isso
  }

  if(slide < slides.length){
    slideBox.innerHTML = slides[slide]();
    slide++;
  }


}
//===========================================
function voltar(){

  // 🟢 se está dentro dos slides
  if(slide > 1){
    slide -= 2;
    proximo();
    return;
  }

  // 🟡 se está no início dos slides → volta para painel
  if(slide === 1){
    slide = 0;
    slideBox.style.display = "none";
    app.style.display = "grid";
    topbar.style.display = "flex";
    return;
  }

  // 🔴 se já está no painel → volta pra capa (index.html)
  if(slide === 0){
    window.location.href = "index.html";
  }
} 
//==============================================
function limpar(){

  const senha = prompt("Para resetar as respostas, digite a senha:");

  if(senha === null) return; // cancelou

  if(senha !== SENHA_RESET){
    alert("Senha incorreta ❌");
    return;
  }

  const confirmar = confirm("Confirmar limpeza de todas as respostas?");

  if(!confirmar) return;

  // limpa banco
  db.ref("respostas").remove();

  // limpa tela
  palavras1 = {};
  palavras3 = {};
  respostas2 = {
    "Sim":0,
    "Parcialmente":0,
    "Não":0
  };

  p1.innerHTML = "";
  p2.innerHTML = "";
  p3.innerHTML = "";
}
</script>

</body>
</html>
